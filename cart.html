<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho - Victor Ribeiro</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="cart.css">
</head>

<body>
    <div class="background-effects"></div>

    <header class="main-header new-header">
        <div class="header-content">
            <a href="gallery.html" class="logo">VICTOR RIBEIRO FOTOGRAFO</a>
        </div>
        <a href="cart.html" class="cart-icon-wrapper absolute-cart">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span class="cart-badge" style="display: none;">0</span>
        </a>
    </header>

    <main class="cart-container">
        <div class="cart-header">
            <h1 class="gallery-title">Meu Carrinho</h1>
            <a href="gallery.html" class="back-to-gallery-link">← Continuar Comprando</a>
        </div>

        <div class="cart-content" id="emptyCartMessage" style="display: none;">
            <p class="gallery-bio">Seu carrinho está vazio.</p>
        </div>

        <div class="cart-content" id="cartContent">
            <!-- Left Side: Items List -->
            <div class="cart-items-section glass-panel">
                <div class="items-list" id="cartItemsList">
                    <!-- Items injected by JS -->
                </div>
            </div>

            <!-- Right Side: Order Summary -->
            <div class="order-summary-section glass-panel">
                <h2>Resumo do Pedido</h2>
                <div class="summary-line">
                    <span>Subtotal</span>
                    <span id="subtotalDisplay">R$ 0,00</span>
                </div>

                <div class="summary-line total-line" style="margin-top: 1rem;">
                    <span>Total</span>
                    <span id="grandTotalDisplay">R$ 0,00</span>
                </div>

                <div class="guest-checkout-form">
                    <h3>Dados de Entrega</h3>
                    <input type="text" id="customerName" placeholder="Nome Completo" required class="form-input">
                    <input type="email" id="customerEmail" placeholder="E-mail" required class="form-input">
                    <input type="tel" id="customerPhone" placeholder="WhatsApp (com DDD)" required class="form-input">
                    <input type="text" id="cepInput" placeholder="CEP (Ex: 01001-000)" maxlength="9" required class="form-input">
                    
                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 0.8rem;">
                        <input type="text" id="addrStreet" placeholder="Rua / Avenida" required class="form-input" readonly style="opacity: 0.7;">
                        <input type="text" id="addrNumber" placeholder="Número" required class="form-input">
                    </div>
                    <input type="text" id="addrComplement" placeholder="Complemento (Opcional)" class="form-input">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem;">
                        <input type="text" id="addrCity" placeholder="Cidade" required class="form-input" readonly style="opacity: 0.7;">
                        <input type="text" id="addrState" placeholder="Estado" required class="form-input" readonly style="opacity: 0.7;">
                    </div>
                </div>

                <button class="btn-checkout full-width" id="checkoutCompleteBtn" style="margin-top: 1.5rem;">
                    Finalizar Compra
                </button>
            </div>
        </div>
    </main>

    <script src="cart.js"></script>
    <script src="cart-badge.js"></script>
</body>

</html>
